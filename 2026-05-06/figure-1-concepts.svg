<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f6f3ea"/>
  <text x="60" y="70" fill="#1f2a36" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">概念区分示意图</text>
  <text x="60" y="108" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif">智能、感受性、自我意识与反思性意识并非同一层次</text>

  <rect x="60" y="160" rx="24" ry="24" width="190" height="270" fill="#d8e6d1" stroke="#6d8a63" stroke-width="2"/>
  <text x="155" y="220" text-anchor="middle" fill="#1f2a36" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">智能</text>
  <text x="155" y="262" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">学习</text>
  <text x="155" y="290" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">规划</text>
  <text x="155" y="318" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">推理</text>
  <text x="155" y="346" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">适应</text>

  <rect x="280" y="140" rx="24" ry="24" width="190" height="290" fill="#f2d7b6" stroke="#b57a3d" stroke-width="2"/>
  <text x="375" y="200" text-anchor="middle" fill="#1f2a36" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">感受性</text>
  <text x="375" y="242" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">痛苦</text>
  <text x="375" y="270" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">愉悦</text>
  <text x="375" y="298" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">恐惧</text>
  <text x="375" y="326" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">舒适</text>

  <rect x="500" y="120" rx="24" ry="24" width="190" height="310" fill="#cfe3ee" stroke="#4e7f97" stroke-width="2"/>
  <text x="595" y="180" text-anchor="middle" fill="#1f2a36" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">自我意识</text>
  <text x="595" y="222" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">区分自我</text>
  <text x="595" y="250" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">与他者</text>
  <text x="595" y="278" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">表征自身</text>
  <text x="595" y="306" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">状态</text>

  <rect x="720" y="100" rx="24" ry="24" width="180" height="330" fill="#e6d8ef" stroke="#7e6093" stroke-width="2"/>
  <text x="810" y="160" text-anchor="middle" fill="#1f2a36" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">反思性</text>
  <text x="810" y="196" text-anchor="middle" fill="#1f2a36" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">意识</text>
  <text x="810" y="242" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">思考</text>
  <text x="810" y="270" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">自己的</text>
  <text x="810" y="298" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">心理状态</text>
  <text x="810" y="326" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">叙述与评估</text>

  <line x1="250" y1="455" x2="900" y2="455" stroke="#5e6a73" stroke-width="3"/>
  <polygon points="900,455 884,447 884,463" fill="#5e6a73"/>
  <text x="575" y="500" text-anchor="middle" fill="#4f5b66" font-size="20" font-family="Arial, Helvetica, sans-serif">复杂度与内在表征层级递增</text>
</svg>
