<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f5f2eb"/>
  <text x="60" y="70" fill="#1f2a36" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">动物意识的连续谱</text>
  <text x="60" y="108" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif">从较高把握度的复杂体验推断，到证据仍不充分的边缘区域</text>

  <line x1="120" y1="360" x2="840" y2="360" stroke="#4f5b66" stroke-width="4"/>
  <polygon points="840,360 824,352 824,368" fill="#4f5b66"/>
  <text x="850" y="366" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif">更不确定</text>
  <text x="120" y="335" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif">较高把握度</text>

  <circle cx="200" cy="360" r="56" fill="#d8e6d1" stroke="#6d8a63" stroke-width="3"/>
  <text x="200" y="352" text-anchor="middle" fill="#1f2a36" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">狗</text>
  <text x="200" y="383" text-anchor="middle" fill="#34424f" font-size="16" font-family="Arial, Helvetica, sans-serif">哺乳动物</text>

  <circle cx="390" cy="360" r="52" fill="#cfe3ee" stroke="#4e7f97" stroke-width="3"/>
  <text x="390" y="352" text-anchor="middle" fill="#1f2a36" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">乌鸦</text>
  <text x="390" y="383" text-anchor="middle" fill="#34424f" font-size="16" font-family="Arial, Helvetica, sans-serif">鸟类</text>

  <circle cx="585" cy="360" r="48" fill="#f2d7b6" stroke="#b57a3d" stroke-width="3"/>
  <text x="585" y="352" text-anchor="middle" fill="#1f2a36" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">章鱼</text>
  <text x="585" y="383" text-anchor="middle" fill="#34424f" font-size="16" font-family="Arial, Helvetica, sans-serif">头足类</text>

  <circle cx="760" cy="360" r="42" fill="#ead8ee" stroke="#8c6192" stroke-width="3"/>
  <text x="760" y="352" text-anchor="middle" fill="#1f2a36" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">昆虫</text>
  <text x="760" y="383" text-anchor="middle" fill="#34424f" font-size="16" font-family="Arial, Helvetica, sans-serif">证据开放</text>

  <text x="200" y="210" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">情绪、依恋、学习</text>
  <line x1="200" y1="225" x2="200" y2="300" stroke="#7b8a91" stroke-width="2" stroke-dasharray="6,6"/>

  <text x="390" y="190" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">工具使用、规划、记忆</text>
  <line x1="390" y1="205" x2="390" y2="308" stroke="#7b8a91" stroke-width="2" stroke-dasharray="6,6"/>

  <text x="585" y="195" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">远缘演化下的复杂行为</text>
  <line x1="585" y1="210" x2="585" y2="312" stroke="#7b8a91" stroke-width="2" stroke-dasharray="6,6"/>

  <text x="760" y="210" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">学习与导航存在</text>
  <text x="760" y="236" text-anchor="middle" fill="#34424f" font-size="18" font-family="Arial, Helvetica, sans-serif">但体验证据薄弱</text>
  <line x1="760" y1="250" x2="760" y2="318" stroke="#7b8a91" stroke-width="2" stroke-dasharray="6,6"/>
</svg>
