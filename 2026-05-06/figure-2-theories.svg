<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f4f1ec"/>
  <text x="60" y="70" fill="#1f2a36" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">意识理论的基本坐标</text>
  <text x="60" y="108" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif">横轴区分是否可还原为物理过程，纵轴区分侧重本体还是机制</text>

  <line x1="140" y1="430" x2="860" y2="430" stroke="#4f5b66" stroke-width="3"/>
  <line x1="220" y1="470" x2="220" y2="130" stroke="#4f5b66" stroke-width="3"/>
  <polygon points="860,430 844,422 844,438" fill="#4f5b66"/>
  <polygon points="220,130 212,146 228,146" fill="#4f5b66"/>

  <text x="770" y="470" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif">更强调物理可还原</text>
  <text x="45" y="160" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif" transform="rotate(-90 45,160)">更强调本体论回答</text>
  <text x="45" y="420" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif" transform="rotate(-90 45,420)">更强调机制与操作化</text>
  <text x="90" y="470" fill="#4f5b66" font-size="18" font-family="Arial, Helvetica, sans-serif">更强调不可还原</text>

  <rect x="275" y="180" rx="20" ry="20" width="140" height="64" fill="#d4e2f0" stroke="#5b7c99" stroke-width="2"/>
  <text x="345" y="220" text-anchor="middle" fill="#1f2a36" font-size="24" font-family="Arial, Helvetica, sans-serif">二元论</text>

  <rect x="455" y="165" rx="20" ry="20" width="150" height="64" fill="#ead8ee" stroke="#8c6192" stroke-width="2"/>
  <text x="530" y="205" text-anchor="middle" fill="#1f2a36" font-size="24" font-family="Arial, Helvetica, sans-serif">泛心论</text>

  <rect x="635" y="180" rx="20" ry="20" width="150" height="64" fill="#d9e8d1" stroke="#6b8a61" stroke-width="2"/>
  <text x="710" y="220" text-anchor="middle" fill="#1f2a36" font-size="24" font-family="Arial, Helvetica, sans-serif">物理主义</text>

  <rect x="585" y="285" rx="20" ry="20" width="150" height="64" fill="#f0d7bf" stroke="#b07848" stroke-width="2"/>
  <text x="660" y="325" text-anchor="middle" fill="#1f2a36" font-size="24" font-family="Arial, Helvetica, sans-serif">功能主义</text>

  <rect x="700" y="355" rx="20" ry="20" width="160" height="64" fill="#d8e7eb" stroke="#5f8793" stroke-width="2"/>
  <text x="780" y="395" text-anchor="middle" fill="#1f2a36" font-size="22" font-family="Arial, Helvetica, sans-serif">全球工作空间</text>

  <rect x="500" y="370" rx="20" ry="20" width="160" height="64" fill="#f1e2b7" stroke="#b09240" stroke-width="2"/>
  <text x="580" y="410" text-anchor="middle" fill="#1f2a36" font-size="22" font-family="Arial, Helvetica, sans-serif">整合信息理论</text>

  <rect x="315" y="315" rx="20" ry="20" width="140" height="64" fill="#e9d6cf" stroke="#a06b60" stroke-width="2"/>
  <text x="385" y="355" text-anchor="middle" fill="#1f2a36" font-size="24" font-family="Arial, Helvetica, sans-serif">幻觉论</text>
</svg>
